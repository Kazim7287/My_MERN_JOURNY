name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 🔴 Job 1: Backend (server)
  backend:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./jobfit/server  # 🔴 Point to server folder

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './jobfit/server/package-lock.json'
    
    - run: npm ci
    - run: npm test || true

  # 🔴 Job 2: Frontend
  frontend:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./jobfit/frontend  # 🔴 Point to frontend folder

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './jobfit/frontend/package-lock.json'
    
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test || true
